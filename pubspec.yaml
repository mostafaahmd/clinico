# اسم المشروع ووصفه (للتوثيق والنشر لو حبيت مستقبلاً)
name: clinico
description: Clinico – nutrition & mental health consultations (Flutter + Riverpod + Supabase)
publish_to: "none"  # بنعطّل النشر لـ pub.dev

# إعداد نسخة Dart/SDK المطلوبة للمشروع
environment:
  sdk: ">=3.4.0 <4.0.0"

# تبع إعدادات Flutter (أصول/ماتيريال)
flutter:
  uses-material-design: true
  assets:
    - assets/ # لو هتضيف صور/أيقونات؛ أنشئ مجلد assets

# الحِزم الأساسية للمشروع (Dependencies)
dependencies:
  # لبّ إطار العمل
  flutter:
    sdk: flutter

  # إدارة الحالة عبر Riverpod (مزج سهولة ووُضوح مع testability عالي)
  flutter_riverpod: ^2.5.0

  # Dependency Injection خفيف وسهل
  get_it: ^7.6.7

  # ربط Supabase (Auth + Database + Realtime + Storage)
  supabase_flutter: ^2.5.6

  # إشعارات محلية + جدولة ومنبّهات (تذكير أدوية + دعم نفسي)
  awesome_notifications: ^0.10.1

  # تخزين محلي بسيط للمفاتيح/القيم (onboarding_seen, تفضيلات…)
  shared_preferences: ^2.3.2

  # توجيه حديث وبسيط
  go_router: ^14.2.0

  # لبناء موديلات غير قابلة للتغيير (immutables) بسهولة
  freezed_annotation: ^2.4.1

  # للتسلسل/التحويل إلى JSON والعكس
  json_annotation: ^4.9.0

  fl_chart: ^0.68.0 # لرسم الرسوم البيانية (تقدم التغذية)

  speech_to_text: ^7.3.0 # لتحويل الصوت إلى نص

  flutter_tts: ^4.2.3 # لتحويل النص إلى صوت
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.0.0
  flutter_bloc: ^9.1.1
  local_auth_android: ^1.0.48
  local_auth_darwin: ^1.4.3

# أدوات التطوير والبناء (Dev Dependencies)
dev_dependencies:
  # لاختبارات Flutter
  flutter_test:
    sdk: flutter

  # مولّدات الكود (تشغيل: dart run build_runner build --delete-conflicting-outputs)
  build_runner: ^2.4.11

  # كود جنريتور لـ Freezed (الموديلات/الستيت)
  freezed: ^2.5.7

  # كود جنريتور لـ JSON
  json_serializable: ^6.9.0

  # قواعد lint الرسمية من Flutter (اختَر رقم يناسب إصدار Flutter عندك)
  flutter_lints: ^4.0.0
